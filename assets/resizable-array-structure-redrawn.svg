<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">多层分块可伸缩数组结构</title>
  <desc id="desc">顶层记录规模、参数和各层块数，并通过索引块指向大小为 B、B 平方直到 B 的 r 减一次方的数据块。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .math { font: italic 19px Georgia, "Times New Roman", serif; fill: #1d4ed8; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 5; }
      .index { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 5; }
      .block { fill: #e2e8f0; stroke: #334155; stroke-width: 2; rx: 4; }
      .partial { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 4; }
      .line { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .guide { fill: none; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" class="title">多层分块的可伸缩数组</text>

  <g aria-label="顶层元数据">
    <text x="70" y="88" class="small">顶层元数据与索引入口</text>
    <rect x="70" y="105" width="70" height="52" class="box"/>
    <text x="105" y="138" text-anchor="middle" class="math">N</text>
    <rect x="150" y="105" width="70" height="52" class="box"/>
    <text x="185" y="138" text-anchor="middle" class="math">B</text>

    <rect x="245" y="105" width="76" height="52" class="box"/>
    <text x="283" y="138" text-anchor="middle" class="math">n₀</text>
    <rect x="321" y="105" width="76" height="52" class="box"/>
    <text x="359" y="138" text-anchor="middle" class="math">n₁</text>
    <rect x="397" y="105" width="76" height="52" class="box"/>
    <text x="435" y="138" text-anchor="middle" class="math">⋯</text>
    <rect x="473" y="105" width="96" height="52" class="box"/>
    <text x="521" y="138" text-anchor="middle" class="math">nᵣ₋₁</text>

    <rect x="610" y="105" width="76" height="52" class="index"/>
    <text x="648" y="137" text-anchor="middle" class="math">A[1]</text>
    <rect x="686" y="105" width="76" height="52" class="index"/>
    <text x="724" y="137" text-anchor="middle" class="math">A[2]</text>
    <rect x="762" y="105" width="76" height="52" class="index"/>
    <text x="800" y="137" text-anchor="middle" class="math">⋯</text>
    <rect x="838" y="105" width="106" height="52" class="index"/>
    <text x="891" y="137" text-anchor="middle" class="math">A[r−1]</text>

    <text x="1010" y="112" class="math">(B/4)ʳ ≤ N ≤ Bʳ</text>
    <text x="1010" y="145" class="math">N¹⁄ʳ ≤ B ≤ 4N¹⁄ʳ</text>
  </g>

  <g aria-label="第一层">
    <path d="M648 157 C648 205, 245 190, 245 245" class="line"/>
    <text x="245" y="224" text-anchor="middle" class="label">第 1 层索引块</text>
    <rect x="120" y="245" width="250" height="48" class="index"/>
    <line x1="170" y1="245" x2="170" y2="293" class="guide"/>
    <line x1="220" y1="245" x2="220" y2="293" class="guide"/>
    <line x1="270" y1="245" x2="270" y2="293" class="guide"/>
    <line x1="320" y1="245" x2="320" y2="293" class="guide"/>
    <text x="245" y="277" text-anchor="middle" class="math">n₁ 个已用指针 / 容量 2B</text>

    <path d="M170 293 L170 340" class="line"/>
    <path d="M320 293 L320 340" class="line"/>
    <rect x="135" y="340" width="70" height="130" class="block"/>
    <rect x="285" y="340" width="70" height="130" class="partial"/>
    <line x1="285" y1="420" x2="355" y2="420" class="guide"/>
    <text x="170" y="410" text-anchor="middle" class="math">B</text>
    <text x="320" y="394" text-anchor="middle" class="math">n₀</text>
    <text x="245" y="505" text-anchor="middle" class="small">大小为 B；末块可以部分填充</text>
  </g>

  <g aria-label="第二层">
    <path d="M724 157 C724 205, 585 190, 585 245" class="line"/>
    <text x="585" y="224" text-anchor="middle" class="label">第 2 层索引块</text>
    <rect x="460" y="245" width="250" height="48" class="index"/>
    <line x1="510" y1="245" x2="510" y2="293" class="guide"/>
    <line x1="560" y1="245" x2="560" y2="293" class="guide"/>
    <line x1="610" y1="245" x2="610" y2="293" class="guide"/>
    <line x1="660" y1="245" x2="660" y2="293" class="guide"/>
    <text x="585" y="277" text-anchor="middle" class="math">n₂ 个已用指针 / 容量 2B</text>

    <path d="M510 293 L510 330" class="line"/>
    <path d="M660 293 L660 330" class="line"/>
    <rect x="475" y="330" width="70" height="190" class="block"/>
    <rect x="625" y="330" width="70" height="190" class="block"/>
    <text x="510" y="430" text-anchor="middle" class="math">B²</text>
    <text x="660" y="430" text-anchor="middle" class="math">B²</text>
    <text x="585" y="555" text-anchor="middle" class="small">大小为 B²；数据块均为满块</text>
  </g>

  <g aria-label="更高层">
    <path d="M891 157 C891 205, 930 190, 930 245" class="line"/>
    <text x="930" y="224" text-anchor="middle" class="label">第 r−1 层索引块</text>
    <rect x="805" y="245" width="250" height="48" class="index"/>
    <line x1="855" y1="245" x2="855" y2="293" class="guide"/>
    <line x1="905" y1="245" x2="905" y2="293" class="guide"/>
    <line x1="955" y1="245" x2="955" y2="293" class="guide"/>
    <line x1="1005" y1="245" x2="1005" y2="293" class="guide"/>
    <text x="930" y="277" text-anchor="middle" class="math">nᵣ₋₁ 个已用指针 / 容量 2B</text>

    <path d="M855 293 L855 320" class="line"/>
    <path d="M1005 293 L1005 320" class="line"/>
    <rect x="820" y="320" width="70" height="255" class="block"/>
    <rect x="970" y="320" width="70" height="255" class="block"/>
    <text x="855" y="455" text-anchor="middle" class="math">Bʳ⁻¹</text>
    <text x="1005" y="455" text-anchor="middle" class="math">Bʳ⁻¹</text>
    <text x="930" y="610" text-anchor="middle" class="small">最高层数据块</text>
  </g>

  <text x="600" y="650" text-anchor="middle" class="small">索引块只保存指针；数据元素按进入数组的先后顺序分布在各层数据块中。</text>
</svg>
