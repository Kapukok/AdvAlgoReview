<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#ffffff"/>
  <style>
    .title { font: 700 28px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
    .label { font: 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
    .small { font: 19px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4b5563; }
    .block { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
    .chunk { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
    .pointer { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; }
    .arrow { stroke: #374151; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#374151"/>
    </marker>
  </defs>

  <text x="600" y="48" text-anchor="middle" class="title">把一个大块改成若干个不超过 t(N) 的小块</text>

  <rect x="55" y="145" width="330" height="115" rx="8" class="block"/>
  <text x="220" y="195" text-anchor="middle" class="label">原来的新块 B</text>
  <text x="220" y="230" text-anchor="middle" class="small">大小为 b，可能远大于 t(N)</text>

  <path d="M415 202 L520 202" class="arrow"/>

  <rect x="555" y="145" width="145" height="115" rx="8" class="chunk"/>
  <rect x="715" y="145" width="145" height="115" rx="8" class="chunk"/>
  <rect x="875" y="145" width="145" height="115" rx="8" class="chunk"/>
  <rect x="1035" y="145" width="105" height="115" rx="8" class="chunk"/>
  <text x="627" y="210" text-anchor="middle" class="label">B₁</text>
  <text x="787" y="210" text-anchor="middle" class="label">B₂</text>
  <text x="947" y="210" text-anchor="middle" class="label">…</text>
  <text x="1087" y="210" text-anchor="middle" class="label">B_m</text>

  <rect x="670" y="82" width="350" height="46" rx="7" class="pointer"/>
  <text x="845" y="113" text-anchor="middle" class="small">额外保存 m 个小块的指针</text>

  <text x="847" y="300" text-anchor="middle" class="small">每个小块的大小至多为 t(N)</text>
  <text x="600" y="356" text-anchor="middle" class="label">m = ceil(b / t(N))；复制时一次只新分配并填充一个小块</text>
</svg>
